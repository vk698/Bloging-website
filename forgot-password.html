<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - iBlog</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/utils.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: linear-gradient(145deg, #fff8f0 0%, #ffe6d5 100%); font-family: 'Inter', sans-serif; }
    .auth-container { max-width: 480px; margin: 4rem auto; background: white; border-radius: 32px; padding: 2rem; }
    .auth-container h2 { color: #e67e22; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    input { width: 100%; padding: 12px; border: 1px solid #ffe0cc; border-radius: 20px; }
    button { 
      background: linear-gradient(95deg, #e67e22, #f39c12); 
      color: white; border: none; padding: 12px; width: 100%; 
      border-radius: 40px; cursor: pointer; 
      transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    button:disabled { opacity: 0.7; cursor: not-allowed; }
    .spinner { width: 18px; height: 18px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast-message {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #2c3e4e;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 0.9rem;
      z-index: 2000;
      display: none;
      align-items: center;
      gap: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      animation: slideUp 0.3s ease;
    }
    .toast-message.success { background: #2ecc71; }
    .toast-message.error { background: #e74c3c; }
    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .back-link { text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
<nav class="navigation max-width-1 m-auto">
  <div class="nav-left">
    <a href="index.html"><img src="img/logo.png" width="50px" alt="logo"></a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="create-blog.html">Create Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="blogs.html">All Blogs</a></li>
    </ul>
  </div>
  <div class="nav-right">
    <form action="search.html"><input class="form-input" placeholder="Search"><button class="btn">Search</button></form>
  </div>
</nav>

<div class="auth-container">
  <h2>Reset Password</h2>
  <p>Enter your email address and we'll send you a link to reset your password.</p>
  <form id="forgotForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>
    <button type="submit" id="sendBtn"><span>Send Reset Link</span></button>
  </form>
  <div class="back-link"><a href="login.html" style="color:#e67e22;">Back to Login</a></div>
</div>

<div id="toast" class="toast-message"></div>

<script>
  const form = document.getElementById('forgotForm');
  const sendBtn = document.getElementById('sendBtn');
  const btnSpan = sendBtn.querySelector('span');
  const toast = document.getElementById('toast');

  function showToast(message, type) {
    toast.innerText = message;
    toast.className = `toast-message ${type}`;
    toast.style.display = 'flex';
    setTimeout(() => {
      toast.style.display = 'none';
    }, 4000);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) return;

    sendBtn.disabled = true;
    btnSpan.innerHTML = '<span class="spinner"></span> Sending...';

    try {
      const res = await fetch('https://iblog-backend-6i6b.onrender.com/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (res.ok) {
        showToast(data.message || 'Reset link sent to your email!', 'success');
        document.getElementById('email').value = '';
      } else {
        showToast(data.error || 'Failed to send reset link. Try again.', 'error');
      }
    } catch (err) {
      showToast('Server error. Try again later.', 'error');
    } finally {
      sendBtn.disabled = false;
      btnSpan.innerHTML = 'Send Reset Link';
    }
  });
</script>
</body>
</html>
