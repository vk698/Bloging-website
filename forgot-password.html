<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - iBlog</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/utils.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: linear-gradient(145deg, #fff8f0 0%, #ffe6d5 100%); font-family: 'Inter', sans-serif; }
    .auth-container { max-width: 480px; margin: 4rem auto; background: white; border-radius: 32px; padding: 2rem; }
    .auth-container h2 { color: #e67e22; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    input { width: 100%; padding: 12px; border: 1px solid #ffe0cc; border-radius: 20px; }
    button { background: linear-gradient(95deg, #e67e22, #f39c12); color: white; border: none; padding: 12px; width: 100%; border-radius: 40px; cursor: pointer; }
    .success-message { background: #d4edda; color: #155724; padding: 10px; border-radius: 20px; margin-bottom: 1rem; text-align: center; display: none; }
    .error-message { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 20px; margin-bottom: 1rem; text-align: center; display: none; }
    .back-link { text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
<nav class="navigation max-width-1 m-auto">
  <div class="nav-left">
    <a href="index.html"><img src="img/logo.png" width="50px" alt="logo"></a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="create-blog.html">Create Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="blogs.html">All Blogs</a></li>
    </ul>
  </div>
  <div class="nav-right">
    <form action="search.html"><input class="form-input" placeholder="Search"><button class="btn">Search</button></form>
  </div>
</nav>

<div class="auth-container">
  <h2>Reset Password</h2>
  <p>Enter your email address and we'll send you a link to reset your password.</p>
  <div id="successMsg" class="success-message"></div>
  <div id="errorMsg" class="error-message"></div>
  <form id="forgotForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>
    <button type="submit">Send Reset Link</button>
  </form>
  <div class="back-link"><a href="login.html" style="color:#e67e22;">Back to Login</a></div>
</div>

<script>
  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const successDiv = document.getElementById('successMsg');
    const errorDiv = document.getElementById('errorMsg');
    successDiv.style.display = 'none';
    errorDiv.style.display = 'none';

    try {
      const res = await fetch('https://iblog-backend-6i6b.onrender.com/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (res.ok) {
        successDiv.innerText = data.message || 'Reset link sent to your email!';
        successDiv.style.display = 'block';
        document.getElementById('email').value = '';
      } else {
        errorDiv.innerText = data.error || 'Failed to send reset link.';
        errorDiv.style.display = 'block';
      }
    } catch (err) {
      errorDiv.innerText = 'Server error. Please try again later.';
      errorDiv.style.display = 'block';
    }
  });
</script>
</body>
</html>
