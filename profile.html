<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - iBlog</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/utils.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: linear-gradient(145deg, #fff8f0 0%, #ffe6d5 100%); font-family: 'Inter', sans-serif; }
    .profile-container { max-width: 700px; margin: 3rem auto; background: white; border-radius: 32px; padding: 2rem; }
    .avatar { text-align: center; margin-bottom: 2rem; }
    .avatar img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #e67e22; }
    .form-group { margin-bottom: 1.2rem; }
    label { font-weight: 600; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #ffe0cc; border-radius: 20px; }
    button { background: #e67e22; color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; }
    .btn-secondary { background: #95a5a6; }
    .logout { margin-top: 2rem; text-align: center; }
  </style>
</head>
<body>
<nav class="navigation max-width-1 m-auto">
  <div class="nav-left">
    <a href="index.html"><img src="img/logo.png" width="50px" alt="logo"></a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="create-blog.html">Create Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="blogs.html">All Blogs</a></li>
    </ul>
  </div>
  <div class="nav-right">
    <form action="search.html"><input class="form-input" placeholder="Search"><button class="btn">Search</button></form>
  </div>
</nav>

<div class="profile-container">
  <h2 style="color:#e67e22;">My Profile</h2>
  <div class="avatar">
    <img id="profileImg" src="https://via.placeholder.com/120" alt="Profile">
  </div>
  <form id="profileForm">
    <div class="form-group">
      <label>Profile Picture</label>
      <input type="file" id="profilePicture" accept="image/*">
    </div>
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" disabled style="background:#f5f5f5;">
    </div>
    <div class="form-group">
      <label>Bio</label>
      <textarea id="bio" rows="4"></textarea>
    </div>
    <button type="submit">Update Profile</button>
  </form>
  <div class="logout">
    <button id="logoutBtn" class="btn-secondary">Logout</button>
  </div>
</div>

<script>
  const token = localStorage.getItem('token');
  if (!token) window.location.href = 'login.html';

  // Load user data
  async function loadProfile() {
    try {
      const res = await fetch('https://iblog-backend-6i6b.onrender.com/api/auth/me', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const user = await res.json();
      if (res.ok) {
        document.getElementById('name').value = user.name;
        document.getElementById('email').value = user.email;
        document.getElementById('bio').value = user.bio || '';
        if (user.profilePicture) {
          document.getElementById('profileImg').src = user.profilePicture;
        }
      } else {
        alert('Session expired. Please login again.');
        localStorage.clear();
        window.location.href = 'login.html';
      }
    } catch (err) { console.error(err); }
  }

  loadProfile();

  // Update profile with image upload
  document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('name').value;
    const bio = document.getElementById('bio').value;
    const fileInput = document.getElementById('profilePicture');
    const formData = new FormData();
    formData.append('name', name);
    formData.append('bio', bio);
    if (fileInput.files[0]) {
      formData.append('profilePicture', fileInput.files[0]);
    }

    try {
      const res = await fetch('https://iblog-backend-6i6b.onrender.com/api/auth/update', {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      });
      const updatedUser = await res.json();
      if (res.ok) {
        localStorage.setItem('user', JSON.stringify(updatedUser));
        if (updatedUser.profilePicture) {
          document.getElementById('profileImg').src = updatedUser.profilePicture;
        }
        alert('Profile updated!');
      } else {
        alert(updatedUser.error || 'Update failed');
      }
    } catch (err) { alert('Error updating profile'); }
  });

  document.getElementById('logoutBtn').onclick = () => {
    localStorage.clear();
    window.location.href = 'index.html';
  };
</script>
</body>
</html>
