<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - iBlog</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/utils.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: linear-gradient(145deg, #fff8f0 0%, #ffe6d5 100%); font-family: 'Inter', sans-serif; }
    .auth-container { max-width: 480px; margin: 4rem auto; background: white; border-radius: 32px; padding: 2rem; }
    .auth-container h2 { color: #e67e22; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    input { width: 100%; padding: 12px; border: 1px solid #ffe0cc; border-radius: 20px; }
    button { background: linear-gradient(95deg, #e67e22, #f39c12); color: white; border: none; padding: 12px; width: 100%; border-radius: 40px; cursor: pointer; }
    .signup-link { text-align: center; margin-top: 1.5rem; }
  </style>
</head>
<body>
<nav class="navigation max-width-1 m-auto">
  <div class="nav-left">
    <a href="index.html"><img src="img/logo.png" width="50px" alt="logo"></a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="create-blog.html">Create Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="blogs.html">All Blogs</a></li>
    </ul>
  </div>
  <div class="nav-right">
    <form action="search.html"><input class="form-input" placeholder="Search"><button class="btn">Search</button></form>
  </div>
</nav>

<div class="auth-container">
  <h2>Login</h2>
  <form id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>
    <button type="submit">Login</button>
  </form>
  <div class="signup-link">Don't have an account? <a href="signup.html" style="color:#e67e22;">Sign Up</a></div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();

    try {
      const res = await fetch('https://iblog-backend-6i6b.onrender.com/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'profile.html';
      } else {
        alert(data.error || 'Login failed');
      }
    } catch (err) {
      alert('Server error');
    }
  });
</script>
</body>
</html>
