<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - iBlog</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/utils.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: linear-gradient(145deg, #fff8f0 0%, #ffe6d5 100%);
      font-family: 'Inter', sans-serif;
    }
    .auth-container {
      max-width: 480px;
      margin: 4rem auto;
      background: white;
      border-radius: 32px;
      padding: 2rem;
      box-shadow: 0 20px 35px -8px rgba(0,0,0,0.1);
    }
    .auth-container h2 {
      color: #e67e22;
      margin-bottom: 1.5rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ffe0cc;
      border-radius: 20px;
      font-family: inherit;
    }
    button {
      background: linear-gradient(95deg, #e67e22, #f39c12);
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 1rem;
    }
    .login-link {
      text-align: center;
      margin-top: 1.5rem;
    }
    .error {
      color: red;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
<nav class="navigation max-width-1 m-auto">
  <div class="nav-left">
    <a href="index.html"><img src="img/logo.png" width="50px" alt="logo"></a>
    <ul id="navMenu">
      <li><a href="index.html">Home</a></li>
      <li><a href="create-blog.html">Create Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="blogs.html">All Blogs</a></li>
    </ul>
  </div>
  <div class="nav-right">
    <form action="search.html">
      <input type="text" class="form-input" placeholder="Search">
      <button class="btn">Search</button>
    </form>
  </div>
</nav>

<div class="auth-container">
  <h2>Create Account</h2>
  <form id="signupForm">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" required>
    </div>
    <div class="form-group">
      <label>Bio (optional)</label>
      <textarea id="bio" rows="3"></textarea>
    </div>
    <button type="submit">Sign Up</button>
  </form>
  <div class="login-link">
    Already have an account? <a href="login.html" style="color:#e67e22;">Login</a>
  </div>
</div>

<script>
  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const bio = document.getElementById('bio').value.trim();

    try {
      const res = await fetch('https://iblog-backend-6i6b.onrender.com/api/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password, bio })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'profile.html';
      } else {
        alert(data.error || 'Signup failed');
      }
    } catch (err) {
      alert('Server error');
    }
  });
</script>
</body>
</html>
