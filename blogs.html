<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>iBlog – All Blogs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="css/utils.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/mobile.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #fff8f0 0%, #ffe6d5 100%);
      color: #2c3e4e;
      scroll-behavior: smooth;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, rgba(230,126,34,0.08) 0%, rgba(255,245,230,0) 70%);
      pointer-events: none;
      z-index: -2;
      animation: drift 18s infinite alternate;
    }
    @keyframes drift {
      0% { transform: scale(1) translate(0, 0); opacity: 0.5; }
      100% { transform: scale(1.2) translate(2%, 1%); opacity: 0.9; }
    }
    .max-width-1 {
      max-width: 1280px;
      width: 90%;
      margin-left: auto;
      margin-right: auto;
    }
    .m-auto {
      margin-left: auto;
      margin-right: auto;
    }
    .navigation {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1.5rem;
      background: rgba(255, 250, 245, 0.85);
      backdrop-filter: blur(14px);
      border-radius: 80px;
      margin-top: 1.2rem;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
      border: 1px solid rgba(255,245,230,0.8);
      position: relative;
    }
    .navigation:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      width: 100%;
      justify-content: space-between;
    }
    .nav-left ul {
      display: flex;
      gap: 1.2rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .nav-left ul li a {
      text-decoration: none;
      color: #2c3e4e;
      font-weight: 600;
      transition: 0.2s;
      position: relative;
      font-size: 0.95rem;
    }
    .nav-left ul li a::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 0;
      height: 2.5px;
      background: linear-gradient(90deg, #e67e22, #f39c12);
      transition: width 0.25s ease;
      border-radius: 3px;
    }
    .nav-left ul li a:hover::after {
      width: 100%;
    }
    .nav-left ul li a:hover {
      color: #e67e22;
    }
    .menu-icon {
      display: none;
      font-size: 1.6rem;
      cursor: pointer;
      color: #e67e22;
      background: none;
      border: none;
    }
    .nav-profile {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: 10px;
      cursor: pointer;
    }
    .profile-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #e67e22;
      background: white;
    }
    .profile-name {
      font-weight: 500;
      font-size: 0.9rem;
    }
    .dropdown-menu {
      position: absolute;
      top: 100%;
      right: 0;
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      min-width: 160px;
      display: none;
      flex-direction: column;
      z-index: 200;
      overflow: hidden;
      margin-top: 8px;
      border: 1px solid #ffe0cc;
    }
    .dropdown-menu a {
      padding: 12px 18px;
      text-decoration: none;
      color: #2c3e4e;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dropdown-menu a:hover {
      background: #fff0e0;
      color: #e67e22;
    }
    .dropdown-menu.show {
      display: flex;
    }
    .nav-profile .auth-links {
      display: flex;
      gap: 8px;
    }
    .nav-profile .auth-links a {
      text-decoration: none;
      color: #e67e22;
      font-weight: 500;
    }
    .nav-right form {
      display: flex;
      gap: 0.6rem;
    }
    .form-input {
      padding: 0.6rem 1.2rem;
      border-radius: 50px;
      border: 1px solid #ffe0cc;
      background: white;
      width: 200px;
      outline: none;
      font-size: 0.9rem;
      transition: 0.2s;
    }
    .form-input:focus {
      border-color: #e67e22;
      box-shadow: 0 0 0 3px rgba(230,126,34,0.2);
    }
    .btn {
      background: linear-gradient(95deg, #e67e22, #f39c12);
      border: none;
      color: white;
      padding: 0.5rem 1.4rem;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:hover {
      transform: scale(0.96);
      background: linear-gradient(95deg, #d35400, #e67e22);
      box-shadow: 0 4px 12px rgba(230,126,34,0.4);
    }
    hr {
      opacity: 0.3;
      margin: 1rem 0;
    }
    .blogs-container {
      max-width: 1100px;
      width: 90%;
      margin: 2rem auto;
      animation: fadeUp 0.5s ease-out;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .blogs-container h2 {
      font-size: clamp(1.6rem, 5vw, 2rem);
      margin-bottom: 1.5rem;
      border-left: 6px solid #e67e22;
      padding-left: 1rem;
    }
    .blog-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      border-radius: 24px;
      padding: 1.5rem;
      margin-bottom: 1.8rem;
      transition: all 0.3s;
      border: 1px solid rgba(230,126,34,0.1);
      cursor: pointer;
    }
    .blog-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 30px -12px rgba(0,0,0,0.15);
      background: white;
    }
    .blog-card h3 {
      color: #e67e22;
      margin-bottom: 0.5rem;
      font-size: clamp(1.2rem, 4vw, 1.6rem);
    }
    .blog-meta {
      color: #7f8c8d;
      font-size: 0.85rem;
      margin-bottom: 0.8rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .blog-content-preview {
      color: #2c3e4e;
      line-height: 1.5;
      margin: 1rem 0;
    }
    .no-blogs {
      text-align: center;
      padding: 3rem;
      background: rgba(255,255,255,0.7);
      border-radius: 2rem;
    }
    .footer {
      text-align: center;
      padding: 2rem 1rem;
      background: #2c3e4e;
      color: #ecf0f1;
      margin-top: 2rem;
      border-radius: 3rem 3rem 0 0;
      font-size: 0.9rem;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 2000;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(5px);
    }
    .modal-content {
      background: white;
      border-radius: 32px;
      max-width: 850px;
      width: 90%;
      max-height: 85vh;
      overflow-y: auto;
      padding: 2rem;
      position: relative;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      animation: modalFade 0.3s ease;
    }
    @keyframes modalFade {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .close-modal {
      position: absolute;
      top: 1rem;
      right: 1.5rem;
      font-size: 2rem;
      cursor: pointer;
      color: #e67e22;
      background: none;
      border: none;
      font-weight: bold;
      transition: 0.2s;
    }
    .close-modal:hover {
      transform: scale(1.1);
      color: #c0392b;
    }
    .modal h3 {
      font-size: 1.8rem;
      color: #e67e22;
      margin-bottom: 1rem;
      padding-right: 2rem;
    }
    .modal .modal-meta {
      margin-bottom: 1.5rem;
      color: #7f8c8d;
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      border-bottom: 1px solid #ffe0cc;
      padding-bottom: 0.8rem;
      align-items: center;
    }
    .modal .full-content {
      line-height: 1.7;
      font-size: 1rem;
      margin-bottom: 1.5rem;
    }
    .like-section {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.5rem;
      border-top: 1px solid #ffe0cc;
      padding-top: 1rem;
    }
    .like-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #e67e22;
      transition: transform 0.1s;
    }
    .like-btn.liked {
      color: #e74c3c;
    }
    .like-btn:hover {
      transform: scale(1.1);
    }
    .comments-section {
      margin-top: 1rem;
    }
    .comment {
      display: flex;
      gap: 12px;
      margin-bottom: 1rem;
      align-items: flex-start;
    }
    .comment-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }
    .comment-bubble {
      background: #f8f4f0;
      border-radius: 18px;
      padding: 8px 14px;
      flex: 1;
    }
    .comment-name {
      font-weight: 600;
      font-size: 0.85rem;
      color: #e67e22;
    }
    .comment-text {
      font-size: 0.9rem;
      margin-top: 4px;
    }
    .comment-time {
      font-size: 0.7rem;
      color: #aaa;
      margin-left: 10px;
    }
    .add-comment {
      display: flex;
      gap: 12px;
      margin-top: 1rem;
      align-items: center;
    }
    .add-comment input {
      flex: 1;
      padding: 10px;
      border-radius: 30px;
      border: 1px solid #ffe0cc;
      outline: none;
    }
    .add-comment button {
      background: #e67e22;
      border: none;
      padding: 8px 20px;
      border-radius: 30px;
      color: white;
      cursor: pointer;
    }
    #ai-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 55px;
      height: 55px;
      background: radial-gradient(circle at 30% 20%, #e67e22, #b64900);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(230,126,34,0.4);
      z-index: 1000;
      border: 2px solid white;
      transition: all 0.25s;
    }
    #ai-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 25px rgba(230,126,34,0.6);
    }
    #ai-box {
      position: fixed;
      bottom: 85px;
      left: 20px;
      width: 340px;
      max-width: calc(100vw - 40px);
      background: rgba(255, 255, 250, 0.98);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 1001;
      font-family: 'Inter', sans-serif;
      animation: fadeScale 0.2s ease;
    }
    @keyframes fadeScale {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    #ai-box::before {
      content: "🐱 Kittu AI Assistant";
      padding: 12px 16px;
      background: linear-gradient(95deg, #e67e22, #f39c12);
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
      display: block;
    }
    #chat {
      height: 340px;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fffcf8;
    }
    .message {
      display: flex;
      flex-direction: column;
      max-width: 88%;
      animation: slideMsg 0.2s ease;
    }
    @keyframes slideMsg {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user { align-self: flex-end; }
    .message.ai { align-self: flex-start; }
    .bubble {
      padding: 8px 14px;
      border-radius: 22px;
      font-size: 0.85rem;
      background: white;
      border: 1px solid #f0e0d2;
    }
    .user .bubble {
      background: #e67e22;
      color: white;
      border: none;
      border-bottom-right-radius: 5px;
    }
    .ai .bubble {
      background: #ffffff;
      border-bottom-left-radius: 5px;
    }
    .timestamp {
      font-size: 0.6rem;
      color: #b0a89c;
      margin: 3px 10px 0;
    }
    .input-wrapper {
      display: flex;
      border-top: 1px solid #f0dfcf;
      background: white;
    }
    #ai-box input {
      flex: 1;
      border: none;
      padding: 12px 14px;
      font-size: 0.85rem;
      outline: none;
      background: #fffaf5;
    }
    #ai-box button {
      border: none;
      background: #e67e22;
      color: white;
      font-weight: 700;
      padding: 0 18px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    #ai-box button:hover {
      background: #d35400;
    }
    .typing span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #e67e22;
      border-radius: 50%;
      margin: 0 2px;
      animation: wave 1.2s infinite;
    }
    @keyframes wave {
      0%,60%,100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    @media (max-width: 768px) {
      .menu-icon { display: block; }
      .nav-left ul { display: none; flex-direction: column; position: absolute; top: 70px; left: 0; right: 0; background: rgba(255,250,245,0.95); border-radius: 30px; padding: 1.2rem; z-index: 100; }
      .nav-left ul.show { display: flex; }
      .nav-left { flex-wrap: wrap; }
      .nav-profile { order: 2; margin-top: 0.5rem; }
      .nav-right { width: 100%; margin-top: 0.8rem; }
      .navigation { flex-wrap: wrap; }
      .blog-card { margin: 1rem; }
      .modal-content { padding: 1rem; width: 95%; }
      .modal h3 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<nav class="navigation max-width-1 m-auto">
  <div class="nav-left">
    <a href="index.html"><span><img src="img/logo.png" width="50px" style="border-radius:12px" alt="logo" /></span></a>
    <button class="menu-icon" id="menuToggle"><i class="fas fa-bars"></i></button>
    <ul id="navMenu">
      <li><a href="index.html">Home</a></li>
      <li><a href="create-blog.html">Create Your Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="blogs.html">All Blogs</a></li>
    </ul>
    <div class="nav-profile" id="profileWidget"></div>
  </div>
  <div class="nav-right">
    <form action="search.html" method="get">
      <input class="form-input" type="text" name="query" placeholder="Article Search" id="searchInput" value="" />
      <button class="btn" type="submit">Search</button>
    </form>
  </div>
</nav>

<div class="max-width-1 m-auto"><hr style="opacity:0.3" /></div>

<div class="blogs-container">
  <h2><i class="fas fa-book-open"></i> All Community Blogs</h2>
  <div id="blogsList"></div>
</div>

<div class="footer">
  <p>Copyright &copy; iBlog.com — read, write, inspire</p>
</div>

<div id="blogModal" class="modal">
  <div class="modal-content">
    <button class="close-modal">&times;</button>
    <h3 id="modalTitle"></h3>
    <div class="modal-meta">
      <span id="modalAuthor"></span>
      <span><i class="far fa-calendar-alt"></i> <span id="modalDate"></span></span>
      <span><i class="fas fa-tag"></i> <span id="modalTags"></span></span>
    </div>
    <div id="modalContent" class="full-content"></div>
    <div class="like-section" id="likeSection">
      <button class="like-btn" id="likeBtn"><i class="fas fa-heart"></i> <span id="likeCount">0</span></button>
    </div>
    <div class="comments-section" id="commentsSection">
      <h4>Comments</h4>
      <div id="commentsList"></div>
      <div class="add-comment" id="addCommentBox">
        <input type="text" id="commentInput" placeholder="Write a comment...">
        <button id="submitCommentBtn">Post</button>
      </div>
    </div>
  </div>
</div>

<div id="ai-btn">🤖</div>
<div id="ai-box">
  <div id="chat"></div>
  <div class="input-wrapper">
    <input id="msg" placeholder="Ask Kittu AI..." />
    <button onclick="askAI()">Send</button>
  </div>
</div>

<script>
  const menuToggle = document.getElementById('menuToggle');
  const navMenu = document.getElementById('navMenu');
  menuToggle.addEventListener('click', () => {
    navMenu.classList.toggle('show');
  });
  document.querySelectorAll('#navMenu a').forEach(link => {
    link.addEventListener('click', () => {
      navMenu.classList.remove('show');
    });
  });

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function updateProfileWidget() {
    const widget = document.getElementById('profileWidget');
    if (!widget) return;
    const token = localStorage.getItem('token');
    const userStr = localStorage.getItem('user');
    if (token && userStr) {
      try {
        const user = JSON.parse(userStr);
        const nameShort = user.name ? user.name.split(' ')[0] : 'User';
        const avatarUrl = user.profilePicture || 'https://via.placeholder.com/38?text=User';
        widget.innerHTML = `
          <div class="profile-trigger" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <img src="${avatarUrl}" class="profile-avatar" onerror="this.src='https://via.placeholder.com/38?text=User'">
            <span class="profile-name">${escapeHtml(nameShort)}</span>
            <i class="fas fa-chevron-down" style="font-size: 12px;"></i>
          </div>
          <div class="dropdown-menu" id="profileDropdown">
            <a href="profile.html"><i class="fas fa-user-circle"></i> Profile</a>
            <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
          </div>
        `;
        const trigger = widget.querySelector('.profile-trigger');
        const dropdown = widget.querySelector('.dropdown-menu');
        trigger.addEventListener('click', (e) => {
          e.stopPropagation();
          dropdown.classList.toggle('show');
        });
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
          e.preventDefault();
          localStorage.removeItem('token');
          localStorage.removeItem('user');
          window.location.reload();
        });
        document.addEventListener('click', function closeDropdown(e) {
          if (!widget.contains(e.target)) {
            dropdown.classList.remove('show');
          }
        });
      } catch(e) {
        widget.innerHTML = `<div class="auth-links"><a href="login.html">Login</a> / <a href="signup.html">Signup</a></div>`;
      }
    } else {
      widget.innerHTML = `<div class="auth-links"><a href="login.html">Login</a> / <a href="signup.html">Signup</a></div>`;
    }
  }
  updateProfileWidget();

  const modal = document.getElementById('blogModal');
  const modalTitle = document.getElementById('modalTitle');
  const modalAuthor = document.getElementById('modalAuthor');
  const modalDate = document.getElementById('modalDate');
  const modalTags = document.getElementById('modalTags');
  const modalContent = document.getElementById('modalContent');
  const closeModalBtn = document.querySelector('.close-modal');
  const likeBtn = document.getElementById('likeBtn');
  const likeCountSpan = document.getElementById('likeCount');
  const commentsListDiv = document.getElementById('commentsList');
  const commentInput = document.getElementById('commentInput');
  const submitCommentBtn = document.getElementById('submitCommentBtn');

  let currentBlog = null;
  let currentUser = null;
  const token = localStorage.getItem('token');
  if (token) {
    try {
      const userStr = localStorage.getItem('user');
      if (userStr) currentUser = JSON.parse(userStr);
    } catch(e) {}
  }

  function openModal(blog) {
    currentBlog = blog;
    modalTitle.innerText = escapeHtml(blog.title);
    const authorPic = blog.authorProfilePic ? escapeHtml(blog.authorProfilePic) : 'https://via.placeholder.com/24?text=U';
    modalAuthor.innerHTML = `<img src="${authorPic}" style="width:24px; height:24px; border-radius:50%; vertical-align:middle; margin-right:8px;"> ${escapeHtml(blog.author)}`;
    const date = blog.createdAt ? new Date(blog.createdAt).toLocaleDateString() : 'Recently';
    modalDate.innerText = date;
    modalTags.innerText = escapeHtml(blog.tags) || 'General';
    modalContent.innerText = escapeHtml(blog.content);
    updateLikeUI();
    renderComments();
    modal.style.display = 'flex';
  }

  function closeModal() {
    modal.style.display = 'none';
    currentBlog = null;
  }
  closeModalBtn.onclick = closeModal;
  window.onclick = function(e) {
    if (e.target === modal) closeModal();
  };

  async function toggleLike() {
    if (!currentBlog || !token) {
      alert("Please login to like.");
      return;
    }
    try {
      const res = await fetch(`https://iblog-backend-6i6b.onrender.com/api/blog/${currentBlog._id}/like`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const data = await res.json();
      if (res.ok) {
        if (data.liked) {
          currentBlog.likes = [...(currentBlog.likes || []), currentUser.id];
        } else {
          currentBlog.likes = (currentBlog.likes || []).filter(id => id !== currentUser.id);
        }
        updateLikeUI();
      } else {
        alert(data.error || 'Error toggling like');
      }
    } catch (err) {
      console.error(err);
      alert('Server error');
    }
  }

  function updateLikeUI() {
    const liked = currentBlog.likes && currentBlog.likes.includes(currentUser?.id);
    likeCountSpan.innerText = currentBlog.likes ? currentBlog.likes.length : 0;
    if (liked) {
      likeBtn.classList.add('liked');
    } else {
      likeBtn.classList.remove('liked');
    }
  }

  likeBtn.onclick = toggleLike;

  async function renderComments() {
    if (!currentBlog) return;
    const comments = currentBlog.comments || [];
    if (comments.length === 0) {
      commentsListDiv.innerHTML = '<p><em>No comments yet.</em></p>';
      return;
    }
    commentsListDiv.innerHTML = '';
    comments.forEach(comment => {
      const commentDiv = document.createElement('div');
      commentDiv.className = 'comment';
      const avatar = comment.userProfilePic && comment.userProfilePic !== '' ? comment.userProfilePic : 'https://via.placeholder.com/32?text=U';
      commentDiv.innerHTML = `
        <img src="${avatar}" class="comment-avatar" onerror="this.src='https://via.placeholder.com/32?text=U'">
        <div class="comment-bubble">
          <span class="comment-name">${escapeHtml(comment.userName)}</span>
          <div class="comment-text">${escapeHtml(comment.text)}</div>
          <span class="comment-time">${new Date(comment.createdAt).toLocaleString()}</span>
        </div>
      `;
      commentsListDiv.appendChild(commentDiv);
    });
  }

  async function addComment() {
    const text = commentInput.value.trim();
    if (!text) return;
    if (!token) {
      alert("Please login to comment.");
      return;
    }
    try {
      const res = await fetch(`https://iblog-backend-6i6b.onrender.com/api/blog/${currentBlog._id}/comment`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ text })
      });
      const newComment = await res.json();
      if (res.ok) {
        currentBlog.comments.push(newComment);
        renderComments();
        commentInput.value = '';
      } else {
        alert(newComment.error || 'Error posting comment');
      }
    } catch (err) {
      alert('Server error');
    }
  }

  submitCommentBtn.onclick = addComment;
  commentInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addComment(); });

  async function loadBlogs() {
    const container = document.getElementById('blogsList');
    container.innerHTML = '<div class="no-blogs"><i class="fas fa-spinner fa-pulse"></i> Loading stories...</div>';
    try {
      const res = await fetch('https://iblog-backend-6i6b.onrender.com/api/blog');
      if (!res.ok) throw new Error('Failed to fetch');
      const blogs = await res.json();
      if (blogs.length === 0) {
        container.innerHTML = '<div class="no-blogs"><i class="fas fa-feather-alt fa-2x"></i><p>No blogs yet. <a href="create-blog.html" style="color:#e67e22;">Create your first blog</a>!</p></div>';
        return;
      }
      container.innerHTML = '';
      blogs.forEach(blog => {
        const card = document.createElement('div');
        card.className = 'blog-card';
        const date = blog.createdAt ? new Date(blog.createdAt).toLocaleDateString() : 'Recently';
        const tagsHtml = blog.tags ? escapeHtml(blog.tags) : 'General';
        const contentPreview = blog.content ? escapeHtml(blog.content.substring(0, 300)) : '';
        const authorPic = blog.authorProfilePic ? escapeHtml(blog.authorProfilePic) : 'https://via.placeholder.com/20?text=U';
        card.innerHTML = `
          <h3><i class="fas fa-quote-left"></i> ${escapeHtml(blog.title)}</h3>
          <div class="blog-meta">
            <span><i class="fas fa-user-edit"></i> 
              <img src="${authorPic}" style="width:20px; height:20px; border-radius:50%; vertical-align:middle; margin-right:5px;">
              ${escapeHtml(blog.author)}
            </span>
            <span><i class="far fa-calendar-alt"></i> ${date}</span>
            <span><i class="fas fa-tag"></i> ${tagsHtml}</span>
          </div>
          <div class="blog-content-preview">${contentPreview}${blog.content.length > 300 ? '…' : ''}</div>
        `;
        card.addEventListener('click', () => openModal(blog));
        container.appendChild(card);
      });
    } catch (error) {
      console.error(error);
      container.innerHTML = '<div class="no-blogs"><i class="fas fa-exclamation-triangle"></i><p>Could not load blogs.</p></div>';
    }
  }
  loadBlogs();

  const AI_BTN = document.getElementById("ai-btn");
  const AI_BOX = document.getElementById("ai-box");
  const CHAT_DIV = document.getElementById("chat");
  const MSG_INPUT = document.getElementById("msg");
  AI_BTN.onclick = () => {
    AI_BOX.style.display = AI_BOX.style.display === "flex" ? "none" : "flex";
    if (AI_BOX.style.display === "flex" && CHAT_DIV.children.length === 0) {
      addMsgToChat("👋 I'm Kittu AI. Want to discover great blogs?", "ai");
    }
  };
  function addMsgToChat(text, sender) {
    const msgDiv = document.createElement("div");
    msgDiv.className = `message ${sender}`;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerText = text;
    const timeSpan = document.createElement("div");
    timeSpan.className = "timestamp";
    timeSpan.innerText = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    msgDiv.appendChild(bubble);
    msgDiv.appendChild(timeSpan);
    CHAT_DIV.appendChild(msgDiv);
    CHAT_DIV.scrollTop = CHAT_DIV.scrollHeight;
  }
  let thinkingEl = null;
  function showThinking() {
    if (thinkingEl) thinkingEl.remove();
    thinkingEl = document.createElement("div");
    thinkingEl.className = "message ai";
    thinkingEl.id = "typingAnim";
    thinkingEl.innerHTML = `<div class="bubble"><div class="typing"><span></span><span></span><span></span> thinking...</div></div>`;
    CHAT_DIV.appendChild(thinkingEl);
    CHAT_DIV.scrollTop = CHAT_DIV.scrollHeight;
  }
  function hideThinking() { if (thinkingEl) thinkingEl.remove(); thinkingEl = null; }
  async function askAI() {
    const msg = MSG_INPUT.value.trim();
    if (!msg) return;
    addMsgToChat(msg, "user");
    MSG_INPUT.value = "";
    MSG_INPUT.disabled = true;
    showThinking();
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 45000);
      const res = await fetch("https://iblog-backend-6i6b.onrender.com/api/ask-ai", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg }),
        signal: controller.signal
      });
      clearTimeout(timeout);
      const data = await res.json();
      hideThinking();
      addMsgToChat(data.reply || "No response.", "ai");
    } catch(err) {
      hideThinking();
      let errMsg = " Backend error.";
      if (err.name === "AbortError") errMsg = " Timeout.";
      addMsgToChat(errMsg, "ai");
    } finally {
      MSG_INPUT.disabled = false;
      MSG_INPUT.focus();
    }
  }
  MSG_INPUT.addEventListener("keypress", (e) => { if (e.key === "Enter") askAI(); });
  window.addEventListener("click", (e) => {
    if (!AI_BOX.contains(e.target) && e.target !== AI_BTN && AI_BOX.style.display === "flex") {
      AI_BOX.style.display = "none";
    }
  });
</script>
</body>
</html>
