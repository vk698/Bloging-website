<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>iBlog – Write Your Story</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="css/utils.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/mobile.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(145deg, #fff8f0 0%, #ffe6d5 100%);
      color: #2c3e4e;
      scroll-behavior: smooth;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 40%, rgba(230,126,34,0.08) 0%, rgba(255,245,230,0) 70%);
      pointer-events: none;
      z-index: -2;
      animation: drift 18s infinite alternate;
    }
    @keyframes drift {
      0% { transform: scale(1) translate(0, 0); opacity: 0.5; }
      100% { transform: scale(1.2) translate(2%, 1%); opacity: 0.9; }
    }
    .max-width-1 {
      max-width: 1280px;
      width: 90%;
      margin-left: auto;
      margin-right: auto;
    }
    .m-auto {
      margin-left: auto;
      margin-right: auto;
    }
    .navigation {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1.5rem;
      background: rgba(255, 250, 245, 0.85);
      backdrop-filter: blur(14px);
      border-radius: 80px;
      margin-top: 1.2rem;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
      transition: all 0.3s ease;
      border: 1px solid rgba(255,245,230,0.8);
      position: relative;
    }
    .navigation:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
    }
    .nav-left {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      width: 100%;
      justify-content: space-between;
    }
    .nav-left ul {
      display: flex;
      gap: 1.2rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .nav-left ul li a {
      text-decoration: none;
      color: #2c3e4e;
      font-weight: 600;
      transition: 0.2s;
      position: relative;
      font-size: 0.95rem;
    }
    .nav-left ul li a::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 0;
      height: 2.5px;
      background: linear-gradient(90deg, #e67e22, #f39c12);
      transition: width 0.25s ease;
      border-radius: 3px;
    }
    .nav-left ul li a:hover::after {
      width: 100%;
    }
    .nav-left ul li a:hover {
      color: #e67e22;
    }
    .menu-icon {
      display: none;
      font-size: 1.6rem;
      cursor: pointer;
      color: #e67e22;
      background: none;
      border: none;
    }
    .nav-profile {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-left: 10px;
      cursor: pointer;
    }
    .profile-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #e67e22;
      background: white;
    }
    .profile-name {
      font-weight: 500;
      font-size: 0.9rem;
    }
    .dropdown-menu {
      position: absolute;
      top: 100%;
      right: 0;
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      min-width: 160px;
      display: none;
      flex-direction: column;
      z-index: 200;
      overflow: hidden;
      margin-top: 8px;
      border: 1px solid #ffe0cc;
    }
    .dropdown-menu a {
      padding: 12px 18px;
      text-decoration: none;
      color: #2c3e4e;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .dropdown-menu a:hover {
      background: #fff0e0;
      color: #e67e22;
    }
    .dropdown-menu.show {
      display: flex;
    }
    .nav-profile .auth-links {
      display: flex;
      gap: 8px;
    }
    .nav-profile .auth-links a {
      text-decoration: none;
      color: #e67e22;
      font-weight: 500;
    }
    .nav-right form {
      display: flex;
      gap: 0.6rem;
    }
    .form-input {
      padding: 0.6rem 1.2rem;
      border-radius: 50px;
      border: 1px solid #ffe0cc;
      background: white;
      width: 200px;
      outline: none;
      font-size: 0.9rem;
      transition: 0.2s;
    }
    .form-input:focus {
      border-color: #e67e22;
      box-shadow: 0 0 0 3px rgba(230,126,34,0.2);
    }
    .btn {
      background: linear-gradient(95deg, #e67e22, #f39c12);
      border: none;
      color: white;
      padding: 0.5rem 1.4rem;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn:hover {
      transform: scale(0.96);
      background: linear-gradient(95deg, #d35400, #e67e22);
      box-shadow: 0 4px 12px rgba(230,126,34,0.4);
    }
    hr {
      opacity: 0.3;
      margin: 1rem 0;
    }
    .blog-form {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(4px);
      border-radius: 2rem;
      padding: 2rem;
      margin: 2rem auto;
      max-width: 900px;
      border: 1px solid rgba(230,126,34,0.15);
      transition: all 0.3s;
      animation: fadeUp 0.5s ease-out;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .blog-form h2 {
      font-size: clamp(1.6rem, 5vw, 2rem);
      margin-bottom: 1.5rem;
      border-left: 6px solid #e67e22;
      padding-left: 1rem;
    }
    .blog-form input, .blog-form textarea, .blog-form select {
      width: 100%;
      padding: 12px;
      margin: 10px 0 20px;
      border: 1px solid #ffe0cc;
      border-radius: 20px;
      font-family: inherit;
      font-size: 1rem;
      background: white;
      transition: 0.2s;
    }
    .blog-form input:focus, .blog-form textarea:focus {
      border-color: #e67e22;
      box-shadow: 0 0 0 3px rgba(230,126,34,0.1);
      outline: none;
    }
    .blog-form textarea {
      min-height: 280px;
      resize: vertical;
    }
    .blog-form button {
      background: linear-gradient(95deg, #e67e22, #f39c12);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    .blog-form button:hover {
      transform: scale(0.98);
      box-shadow: 0 6px 14px rgba(230,126,34,0.3);
    }
    .success-msg {
      background: #d4edda;
      color: #155724;
      padding: 12px;
      border-radius: 20px;
      margin-bottom: 20px;
      display: none;
      font-weight: 500;
    }
    .footer {
      text-align: center;
      padding: 2rem 1rem;
      background: #2c3e4e;
      color: #ecf0f1;
      margin-top: 2rem;
      border-radius: 3rem 3rem 0 0;
      font-size: 0.9rem;
    }
    #ai-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      width: 55px;
      height: 55px;
      background: radial-gradient(circle at 30% 20%, #e67e22, #b64900);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(230,126,34,0.4);
      z-index: 1000;
      border: 2px solid white;
      transition: all 0.25s;
    }
    #ai-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 12px 25px rgba(230,126,34,0.6);
    }
    #ai-box {
      position: fixed;
      bottom: 85px;
      left: 20px;
      width: 340px;
      max-width: calc(100vw - 40px);
      background: rgba(255, 255, 250, 0.98);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 1001;
      font-family: 'Inter', sans-serif;
      animation: fadeScale 0.2s ease;
    }
    @keyframes fadeScale {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    #ai-box::before {
      content: "🐱 Kittu AI Assistant";
      padding: 12px 16px;
      background: linear-gradient(95deg, #e67e22, #f39c12);
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
      display: block;
    }
    #chat {
      height: 340px;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fffcf8;
    }
    .message {
      display: flex;
      flex-direction: column;
      max-width: 88%;
      animation: slideMsg 0.2s ease;
    }
    @keyframes slideMsg {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user { align-self: flex-end; }
    .message.ai { align-self: flex-start; }
    .bubble {
      padding: 8px 14px;
      border-radius: 22px;
      font-size: 0.85rem;
      background: white;
      border: 1px solid #f0e0d2;
    }
    .user .bubble {
      background: #e67e22;
      color: white;
      border: none;
      border-bottom-right-radius: 5px;
    }
    .ai .bubble {
      background: #ffffff;
      border-bottom-left-radius: 5px;
    }
    .timestamp {
      font-size: 0.6rem;
      color: #b0a89c;
      margin: 3px 10px 0;
    }
    .input-wrapper {
      display: flex;
      border-top: 1px solid #f0dfcf;
      background: white;
    }
    #ai-box input {
      flex: 1;
      border: none;
      padding: 12px 14px;
      font-size: 0.85rem;
      outline: none;
      background: #fffaf5;
    }
    #ai-box button {
      border: none;
      background: #e67e22;
      color: white;
      font-weight: 700;
      padding: 0 18px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    #ai-box button:hover {
      background: #d35400;
    }
    .typing span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #e67e22;
      border-radius: 50%;
      margin: 0 2px;
      animation: wave 1.2s infinite;
    }
    @keyframes wave {
      0%,60%,100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    @media (max-width: 768px) {
      .menu-icon {
        display: block;
      }
      .nav-left ul {
        display: none;
        flex-direction: column;
        width: 100%;
        background: rgba(255, 250, 245, 0.95);
        backdrop-filter: blur(14px);
        position: absolute;
        top: 70px;
        left: 0;
        right: 0;
        border-radius: 30px;
        padding: 1.2rem;
        gap: 1rem;
        z-index: 100;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      }
      .nav-left ul.show {
        display: flex;
      }
      .nav-left {
        width: 100%;
        justify-content: space-between;
        flex-wrap: wrap;
      }
      .nav-profile {
        order: 2;
        margin-left: 0;
        margin-top: 0.5rem;
      }
      .nav-right {
        width: 100%;
        margin-top: 0.8rem;
      }
      .nav-right form {
        justify-content: center;
        flex-wrap: wrap;
      }
      .form-input {
        width: 100%;
      }
      .navigation {
        flex-wrap: wrap;
        border-radius: 2rem;
        padding: 1rem;
      }
      .blog-form {
        margin: 1rem auto;
        padding: 1.5rem;
      }
      #ai-box {
        left: 12px;
        bottom: 78px;
        width: calc(100vw - 30px);
        max-width: 320px;
      }
      #ai-btn {
        left: 12px;
        bottom: 12px;
        width: 48px;
        height: 48px;
        font-size: 24px;
      }
    }
    @media (min-width: 769px) and (max-width: 1024px) {
      .max-width-1 {
        width: 95%;
      }
      .form-input {
        width: 180px;
      }
    }
  </style>
</head>
<body>

<nav class="navigation max-width-1 m-auto">
  <div class="nav-left">
    <a href="index.html"><span><img src="img/logo.png" width="50px" style="border-radius:12px" alt="logo" /></span></a>
    <button class="menu-icon" id="menuToggle"><i class="fas fa-bars"></i></button>
    <ul id="navMenu">
      <li><a href="index.html">Home</a></li>
      <li><a href="create-blog.html">Create Your Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="blogs.html">All Blogs</a></li>
    </ul>
    <div class="nav-profile" id="profileWidget"></div>
  </div>
  <div class="nav-right">
    <form action="search.html" method="get">
      <input class="form-input" type="text" name="query" placeholder="Article Search" id="searchInput" value="" />
      <button class="btn" type="submit">Search</button>
    </form>
  </div>
</nav>

<div class="max-width-1 m-auto"><hr style="opacity:0.3" /></div>

<div class="blog-form">
  <h2><i class="fas fa-feather-alt"></i> Write Your Blog</h2>
  <div id="successMsg" class="success-msg"><i class="fas fa-check-circle"></i> Blog published successfully!</div>
  <form id="blogForm">
    <label><i class="fas fa-heading"></i> Blog Title *</label>
    <input type="text" id="blogTitle" required placeholder="e.g., 10 Tips for Better Writing">
    <label><i class="fas fa-user"></i> Author Name *</label>
    <input type="text" id="blogAuthor" required placeholder="Your pen name">
    <label><i class="fas fa-tags"></i> Category / Tags</label>
    <input type="text" id="blogTags" placeholder="e.g., Lifestyle, Tech, Food">
    <label><i class="fas fa-paragraph"></i> Content *</label>
    <textarea id="blogContent" required placeholder="Write your amazing story here..."></textarea>
    <button type="submit"><i class="fas fa-paper-plane"></i> Publish Blog</button>
  </form>
  <p style="margin-top: 20px; text-align: center;"><a href="blogs.html" style="color:#e67e22; font-weight:600;">📖 View all published blogs</a></p>
</div>

<div class="footer">
  <p>Copyright &copy; iBlog.com — share your voice</p>
</div>

<div id="ai-btn">🤖</div>
<div id="ai-box">
  <div id="chat"></div>
  <div class="input-wrapper">
    <input id="msg" placeholder="Ask Kittu AI..." />
    <button onclick="askAI()">Send</button>
  </div>
</div>

<script>
  const menuToggle = document.getElementById('menuToggle');
  const navMenu = document.getElementById('navMenu');
  menuToggle.addEventListener('click', () => {
    navMenu.classList.toggle('show');
  });

  document.querySelectorAll('#navMenu a').forEach(link => {
    link.addEventListener('click', () => {
      navMenu.classList.remove('show');
    });
  });

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function updateProfileWidget() {
    const widget = document.getElementById('profileWidget');
    if (!widget) return;
    const token = localStorage.getItem('token');
    const userStr = localStorage.getItem('user');
    if (token && userStr) {
      try {
        const user = JSON.parse(userStr);
        const nameShort = user.name ? user.name.split(' ')[0] : 'User';
        const avatarUrl = user.profilePicture || 'https://via.placeholder.com/38?text=User';
        widget.innerHTML = `
          <div class="profile-trigger" style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <img src="${avatarUrl}" class="profile-avatar" onerror="this.src='https://via.placeholder.com/38?text=User'">
            <span class="profile-name">${escapeHtml(nameShort)}</span>
            <i class="fas fa-chevron-down" style="font-size: 12px;"></i>
          </div>
          <div class="dropdown-menu" id="profileDropdown">
            <a href="profile.html"><i class="fas fa-user-circle"></i> Profile</a>
            <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
          </div>
        `;
        const trigger = widget.querySelector('.profile-trigger');
        const dropdown = widget.querySelector('.dropdown-menu');
        trigger.addEventListener('click', (e) => {
          e.stopPropagation();
          dropdown.classList.toggle('show');
        });
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
          e.preventDefault();
          localStorage.removeItem('token');
          localStorage.removeItem('user');
          window.location.reload();
        });
        document.addEventListener('click', function closeDropdown(e) {
          if (!widget.contains(e.target)) {
            dropdown.classList.remove('show');
          }
        });
      } catch(e) {
        widget.innerHTML = `<div class="auth-links"><a href="login.html">Login</a> / <a href="signup.html">Signup</a></div>`;
      }
    } else {
      widget.innerHTML = `<div class="auth-links"><a href="login.html">Login</a> / <a href="signup.html">Signup</a></div>`;
    }
  }

  updateProfileWidget();

  document.getElementById('blogForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const title = document.getElementById('blogTitle').value.trim();
    const author = document.getElementById('blogAuthor').value.trim();
    const tags = document.getElementById('blogTags').value.trim();
    const content = document.getElementById('blogContent').value.trim();

    if (!title || !author || !content) {
      alert("Please fill all required fields.");
      return;
    }

    const userStr = localStorage.getItem('user');
    let userId = null;
    if (userStr) {
      try {
        const user = JSON.parse(userStr);
        userId = user.id;
      } catch(e) {}
    }

    if (!userId) {
      alert("Please login to create a blog.");
      window.location.href = "login.html";
      return;
    }

    try {
      console.log("🚀 Sending request...");

      const res = await fetch("https://iblog-backend-6i6b.onrender.com/api/blog", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          title: title,
          author: author,
          tags: tags,
          content: content,
          userId: userId
        })
      });

      console.log("✅ Response status:", res.status);

      const data = await res.json();
      console.log("📦 Response data:", data);

      if (res.ok) {
        const successDiv = document.getElementById('successMsg');
        successDiv.style.display = 'block';

        document.getElementById('blogForm').reset();
        setTimeout(() => successDiv.style.display = 'none', 3000);

        console.log("Saved:", data);
      } else {
        alert("Blog NOT saved ❌");
        console.log("Error:", data);
      }

    } catch (error) {
      console.log("❌ FULL ERROR:", error);
      alert("Error saving blog ❌");
    }
  });

  const AI_BTN = document.getElementById("ai-btn");
  const AI_BOX = document.getElementById("ai-box");
  const CHAT_DIV = document.getElementById("chat");
  const MSG_INPUT = document.getElementById("msg");

  AI_BTN.onclick = () => {
    AI_BOX.style.display = AI_BOX.style.display === "flex" ? "none" : "flex";
    if (AI_BOX.style.display === "flex" && CHAT_DIV.children.length === 0) {
      addMsgToChat("👋 I'm Kittu AI. Need help with your blog post?", "ai");
    }
  };

  function addMsgToChat(text, sender) {
    const msgDiv = document.createElement("div");
    msgDiv.className = `message ${sender}`;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerText = text;
    const timeSpan = document.createElement("div");
    timeSpan.className = "timestamp";
    timeSpan.innerText = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    msgDiv.appendChild(bubble);
    msgDiv.appendChild(timeSpan);
    CHAT_DIV.appendChild(msgDiv);
    CHAT_DIV.scrollTop = CHAT_DIV.scrollHeight;
  }

  let thinkingEl = null;
  function showThinking() {
    if (thinkingEl) thinkingEl.remove();
    thinkingEl = document.createElement("div");
    thinkingEl.className = "message ai";
    thinkingEl.id = "typingAnim";
    thinkingEl.innerHTML = `<div class="bubble"><div class="typing"><span></span><span></span><span></span> thinking...</div></div>`;
    CHAT_DIV.appendChild(thinkingEl);
    CHAT_DIV.scrollTop = CHAT_DIV.scrollHeight;
  }
  function hideThinking() {
    if (thinkingEl) thinkingEl.remove();
    thinkingEl = null;
  }

  async function askAI() {
    const msg = MSG_INPUT.value.trim();
    if (!msg) return;
    addMsgToChat(msg, "user");
    MSG_INPUT.value = "";
    MSG_INPUT.disabled = true;
    showThinking();
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 45000);
      const res = await fetch("https://iblog-backend-6i6b.onrender.com/api/ask-ai", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg }),
        signal: controller.signal
      });
      clearTimeout(timeout);
      const data = await res.json();
      hideThinking();
      addMsgToChat(data.reply || "No response.", "ai");
    } catch(err) {
      hideThinking();
      console.log("❌ AI ERROR:", err);
      addMsgToChat(" Backend error.", "ai");
    } finally {
      MSG_INPUT.disabled = false;
      MSG_INPUT.focus();
    }
  }

  MSG_INPUT.addEventListener("keypress", (e) => {
    if (e.key === "Enter") askAI();
  });

  window.addEventListener("click", (e) => {
    if (!AI_BOX.contains(e.target) && e.target !== AI_BTN && AI_BOX.style.display === "flex") {
      AI_BOX.style.display = "none";
    }
  });
</script>
</body>
</html>
