<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - iBlog</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/utils.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: linear-gradient(145deg, #fff8f0 0%, #ffe6d5 100%); font-family: 'Inter', sans-serif; }
    .auth-container { max-width: 480px; margin: 4rem auto; background: white; border-radius: 32px; padding: 2rem; }
    .auth-container h2 { color: #e67e22; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    input { width: 100%; padding: 12px; border: 1px solid #ffe0cc; border-radius: 20px; }
    button { 
      background: linear-gradient(95deg, #e67e22, #f39c12); 
      color: white; border: none; padding: 12px; width: 100%; 
      border-radius: 40px; cursor: pointer; 
      transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    button:disabled { opacity: 0.7; cursor: not-allowed; }
    .spinner { width: 18px; height: 18px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .message { padding: 10px; border-radius: 20px; margin-bottom: 1rem; text-align: center; display: none; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .back-link { text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
<nav class="navigation max-width-1 m-auto">
  <div class="nav-left">
    <a href="index.html"><img src="img/logo.png" width="50px" alt="logo"></a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="create-blog.html">Create Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="blogs.html">All Blogs</a></li>
    </ul>
  </div>
  <div class="nav-right">
    <form action="search.html"><input class="form-input" placeholder="Search"><button class="btn">Search</button></form>
  </div>
</nav>

<div class="auth-container">
  <h2>Set New Password</h2>
  <div id="msg" class="message"></div>
  <form id="resetForm">
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="password" required>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" required>
    </div>
    <button type="submit" id="resetBtn"><span>Reset Password</span></button>
  </form>
  <div class="back-link"><a href="login.html" style="color:#e67e22;">Back to Login</a></div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const msgDiv = document.getElementById('msg');
  const resetForm = document.getElementById('resetForm');
  const resetBtn = document.getElementById('resetBtn');
  const btnTextSpan = resetBtn.querySelector('span');

  if (!token) {
    msgDiv.innerText = 'Invalid reset link. Missing token.';
    msgDiv.className = 'message error';
    msgDiv.style.display = 'block';
    resetForm.style.display = 'none';
  }

  resetForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('password').value.trim();
    const confirm = document.getElementById('confirmPassword').value.trim();
    msgDiv.style.display = 'none';

    if (password !== confirm) {
      msgDiv.innerText = 'Passwords do not match.';
      msgDiv.className = 'message error';
      msgDiv.style.display = 'block';
      return;
    }
    if (password.length < 6) {
      msgDiv.innerText = 'Password must be at least 6 characters.';
      msgDiv.className = 'message error';
      msgDiv.style.display = 'block';
      return;
    }

    resetBtn.disabled = true;
    btnTextSpan.innerHTML = '<span class="spinner"></span> Resetting...';

    try {
      const res = await fetch('https://iblog-backend-6i6b.onrender.com/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: password })
      });
      const data = await res.json();
      if (res.ok) {
        msgDiv.innerText = data.message || 'Password reset successful! Redirecting to login...';
        msgDiv.className = 'message success';
        msgDiv.style.display = 'block';
        setTimeout(() => { window.location.href = 'login.html'; }, 3000);
      } else {
        msgDiv.innerText = data.error || 'Reset failed.';
        msgDiv.className = 'message error';
        msgDiv.style.display = 'block';
        resetBtn.disabled = false;
        btnTextSpan.innerHTML = 'Reset Password';
      }
    } catch (err) {
      msgDiv.innerText = 'Server error. Try again later.';
      msgDiv.className = 'message error';
      msgDiv.style.display = 'block';
      resetBtn.disabled = false;
      btnTextSpan.innerHTML = 'Reset Password';
    }
  });
</script>
</body>
</html>
