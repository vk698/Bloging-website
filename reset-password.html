<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - iBlog</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/utils.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: linear-gradient(145deg, #fff8f0 0%, #ffe6d5 100%); font-family: 'Inter', sans-serif; }
    .auth-container { max-width: 500px; margin: 4rem auto; background: white; border-radius: 32px; padding: 2rem; }
    h2 { color: #e67e22; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    input, textarea { width: 100%; padding: 12px; border: 1px solid #ffe0cc; border-radius: 20px; }
    button { background: linear-gradient(95deg, #e67e22, #f39c12); color: white; border: none; padding: 12px; width: 100%; border-radius: 40px; cursor: pointer; margin-top: 0.5rem; }
    .message { padding: 10px; border-radius: 20px; margin-bottom: 1rem; display: none; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
    .back-link { text-align: center; margin-top: 1rem; }
    hr { margin: 1rem 0; }
  </style>
</head>
<body>
<nav class="navigation max-width-1 m-auto">
  <div class="nav-left">
    <a href="index.html"><img src="img/logo.png" width="50px" alt="logo"></a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="create-blog.html">Create Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="blogs.html">All Blogs</a></li>
    </ul>
  </div>
  <div class="nav-right">
    <form action="search.html"><input class="form-input" placeholder="Search"><button class="btn">Search</button></form>
  </div>
</nav>

<div class="auth-container">
  <h2>Set New Password</h2>
  <div id="msg" class="message"></div>
  <form id="resetForm">
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="password" required>
    </div>
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirmPassword" required>
    </div>
    <button type="submit">Reset Password</button>
  </form>
  
  <hr>
  <details>
    <summary style="cursor:pointer; color:#e67e22;">🔧 Token not working? Enter manually</summary>
    <div class="form-group" style="margin-top:1rem;">
      <label>Paste the full reset link from your email:</label>
      <input type="text" id="manualUrl" placeholder="https://...?token=...">
      <button type="button" id="extractTokenBtn">Extract Token & Reset</button>
    </div>
  </details>
  
  <div class="back-link"><a href="login.html" style="color:#e67e22;">Back to Login</a></div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  let token = urlParams.get('token');
  const msgDiv = document.getElementById('msg');
  const resetForm = document.getElementById('resetForm');
  const resetBtn = document.querySelector('#resetForm button');
  const manualUrlInput = document.getElementById('manualUrl');
  const extractBtn = document.getElementById('extractTokenBtn');

  function showMessage(text, type) {
    msgDiv.innerText = text;
    msgDiv.className = `message ${type}`;
    msgDiv.style.display = 'block';
    setTimeout(() => { msgDiv.style.display = 'none'; }, 5000);
  }

  // If no token in URL, try to extract from localStorage or show help
  if (!token) {
    console.warn("No token in URL");
    // Allow manual entry
    resetForm.style.opacity = '0.5';
    resetBtn.disabled = true;
    showMessage("⚠️ No token found in the link. Please use the manual entry below.", "info");
  } else {
    resetForm.style.opacity = '1';
    resetBtn.disabled = false;
  }

  // Extract token from full URL
  extractBtn.addEventListener('click', () => {
    const fullUrl = manualUrlInput.value.trim();
    if (!fullUrl) {
      showMessage("Please paste the full reset link from your email.", "error");
      return;
    }
    try {
      const urlObj = new URL(fullUrl);
      const extractedToken = urlObj.searchParams.get('token');
      if (extractedToken) {
        token = extractedToken;
        // Update browser URL without reload
        const newUrl = window.location.pathname + '?token=' + token;
        window.history.replaceState({}, '', newUrl);
        showMessage("✅ Token extracted! You can now reset your password.", "success");
        resetForm.style.opacity = '1';
        resetBtn.disabled = false;
      } else {
        showMessage("Invalid link – no token parameter found.", "error");
      }
    } catch(e) {
      showMessage("Invalid URL format. Please copy the entire link from your email.", "error");
    }
  });

  resetForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!token) {
      showMessage("No token available. Please use manual entry.", "error");
      return;
    }
    const password = document.getElementById('password').value.trim();
    const confirm = document.getElementById('confirmPassword').value.trim();

    if (password !== confirm) {
      showMessage("Passwords do not match.", "error");
      return;
    }
    if (password.length < 6) {
      showMessage("Password must be at least 6 characters.", "error");
      return;
    }

    resetBtn.disabled = true;
    resetBtn.innerHTML = '<span class="spinner"></span> Resetting...';

    try {
      const res = await fetch('https://iblog-backend-6i6b.onrender.com/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: password })
      });
      const data = await res.json();
      if (res.ok) {
        showMessage("✅ Password reset successful! Redirecting to login...", "success");
        setTimeout(() => { window.location.href = 'login.html'; }, 3000);
      } else {
        showMessage(data.error || "Reset failed. Token may be expired or invalid.", "error");
        resetBtn.disabled = false;
        resetBtn.innerHTML = 'Reset Password';
      }
    } catch (err) {
      showMessage("Server error. Try again later.", "error");
      resetBtn.disabled = false;
      resetBtn.innerHTML = 'Reset Password';
    }
  });
</script>
</body>
</html>
